
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=], initial-scale=1.0" />
    <title>Document</title>
    <script>
      function converter() {
        //step-1:  Read the dollar value
        let dollar = document.getElementById("dollar").value;

        //Step-2: Perfrom th logics
        let inrValue = dollar * 95.78;

        //Step-3: Set the result to result box
        document.getElementById("inr").value = inrValue.toFixed(2);
      }
    </script>
  </head>
  <body>
    <label for="">Enter the Dollar value: </label>
    <input type="number" id="dollar"  oninput="converter()"/> <br />
    <br />

    <label for="">The INR value:</label>
    <input type="number" id="inr" readonly /> <br />
    <br />

    <!-- <button onclick="converter()">Convert</button> -->

    <p id="msg"></p>
    <h1 id="msg2"></h1>
  </body>
</html>
