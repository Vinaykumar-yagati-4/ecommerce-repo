<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu page</title>

    <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f2f2f2;
    }

    /* Button */
    .btn{
      font-size:28px;
      background:lightgreen;
      color:white;
      border:none;
      padding:10px 20px;
      cursor:pointer;
      margin:20px;
    }

    /* Menu */
    .menu{
      width:200px;
      background:#333;
      position:absolute;
      top:80px;
      left:-220px;
      transition:0.4s;
    }

    .menu a{
      display:block;
      color:white;
      text-decoration:none;
      padding:15px;
      border-bottom:1px solid #555;
    }

    .menu a:hover{
      background:#555;
    }

    /* Open Menu */
    .menu.show{
      left:20px;
    }
  </style>
</head>
<!-- Same button for open & close -->
  <button class="btn" onclick="toggleMenu()">☰</button>

  <!-- Menu -->
  <div class="menu" id="menu">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </div>

  <script>
    function toggleMenu(){
      document.getElementById("menu").classList.toggle("show");
    }
  </script>
<body>
    
</body>
</html>
