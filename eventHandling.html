<!DOCTYPE html>
<html>
<head>
    <title>Add Two Numbers</title>
</head>
<body>

    <h2>Addition Calculator</h2>

    <label>Enter the First Number:</label>
    <input type="number" id="num1"><br><br>

    <label>Enter the Second Number:</label>
    <input type="number" id="num2" oninput="addNumbers()"><br /><br />

    <label>Result:</label>
    <input type="text" id="result" readonly><br><br>

    <!-- <button onclick="addNumbers()">Add</button> -->

    <script>
        function addNumbers() {
            let firstNumber = Number(document.getElementById("num1").value);
            let secondNumber = Number(document.getElementById("num2").value);

            let sum = firstNumber + secondNumber;

            document.getElementById("result").value = sum;
        }
    </script>

</body>
</html>
